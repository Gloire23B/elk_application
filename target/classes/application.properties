# ============================================================
# Exchange Rate Proxy — Configuration Spring Boot
# ============================================================

spring.application.name=exchange-rate-proxy
server.port=8090

# ---- Kafka ----
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=exchange-rate-consumers
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3

# ---- Elasticsearch ----
elasticsearch.host=localhost
elasticsearch.port=9200
spring.data.elasticsearch.repositories.enabled=true
spring.elasticsearch.uris=http://localhost:9200

# ---- API Externe ----
exchange-rate.api.base-url=https://api.exchangerate-api.com/v4
exchange-rate.api.timeout-seconds=10

# ---- Scheduler ----
exchange-rate.scheduler.enabled=true
# Toutes les 60 minutes (production)
exchange-rate.scheduler.cron=0 0 * * * *

# ---- MVC — erreur 404 propre pour les routes inconnues ----
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# ---- Actuator (monitoring) ----
management.endpoints.web.exposure.include=health,info,metrics,kafka
management.endpoint.health.show-details=always

# ---- Logging structuré ----
logging.level.com.proxy.exchangerate=INFO
logging.level.org.apache.kafka=WARN
logging.level.org.elasticsearch=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%logger{36}] - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%logger{36}] - %msg%n
logging.file.name=logs/exchange-rate-proxy.log
