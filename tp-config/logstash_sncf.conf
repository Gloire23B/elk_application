# ============================================================
#  logstash_sncf.conf — CSV SNCF complet → Elasticsearch
#
#  ============================================================
#  BUGS CORRIGÉS (2) :
#
#  BUG 1 — Fichier sans extension
#  AVANT : tp-config\logstash_sncf_conf   ← pas d'extension .conf
#  APRÈS : logstash_sncf.conf             ← extension .conf obligatoire
#  Conséquence : Logstash ne détectait pas ce fichier.
#
#  BUG 2 — Adresse Elasticsearch incorrecte
#  AVANT : hosts => [ "ip_de_votre_elasticsearch" ]  ← placeholder non remplacé
#  APRÈS : hosts => [ "elasticsearch" ]              ← nom du service Docker
#  Conséquence : Logstash ne pouvait pas se connecter à Elasticsearch.
#  Dans Docker Compose, les services se joignent par leur nom de service.
#  ============================================================
#
#  Lancement :
#  logstash -f /usr/share/logstash/tp-config/logstash_sncf.conf \
#           --path.data sncf
# ============================================================

input {
    file {
        path => [ "/usr/share/logstash/tp-data/regularite-mensuelle-tgv.csv" ]
        start_position => 'beginning'
        sincedb_path => "/dev/null"
    }
}

filter {
    csv {
        columns => ["date","axe","depart","arrivee","trains_programmes",
                    "trains_circules","trains_annules","trains_retards","regularite"]
        separator => ";"
    }

    # Modification du champ date de la forme yyyy-mm vers yyyy-mm-dd
    mutate {
        replace => { "date" => "%{date}-01" }
    }

    # Cast du champ date vers un timestamp reconnu par Elasticsearch
    date {
        match => [ "date", "YYYY-MM-dd" ]
        timezone => "UTC"
        remove_field => ["date"]
    }

    # Cast des champs numériques
    mutate {
        convert => { "trains_annules"    => "integer" }
        convert => { "trains_retards"    => "integer" }
        convert => { "trains_programmes" => "integer" }
        convert => { "regularite"        => "float"   }
        convert => { "trains_circules"   => "float"   }
    }
}

output {
    elasticsearch {
        # ✅ CORRIGÉ : "elasticsearch" (nom service Docker) au lieu de "ip_de_votre_elasticsearch"
        hosts => [ "elasticsearch" ]
        index => "sncf"
    }
}
