# ============================================================
#  logstash_short_sncf_with_filter.conf
#
#  ============================================================
#  BUGS CORRIGÉS (2) :
#
#  BUG 1 — Extension du fichier
#  AVANT : logstash_short_sncf_with_filter.CONG  ← typo, extension invalide
#  APRÈS : logstash_short_sncf_with_filter.CONF  ← Logstash ne reconnaît que .conf
#  Conséquence : Logstash ignorait silencieusement ce fichier.
#
#  BUG 2 — sincedb_path Windows
#  AVANT : sincedb_path => "nul"    ← chemin Windows (NUL device)
#  APRÈS : sincedb_path => "/dev/null"  ← chemin Linux/Docker correct
#  Conséquence : Logstash ne pouvait pas écrire le fichier sincedb
#  et relisait le fichier à chaque démarrage de manière imprévisible.
#  ============================================================
#
#  Lancement :
#  logstash -f /usr/share/logstash/tp-config/logstash_short_sncf_with_filter.conf \
#           --path.data sncf-short-filter
# ============================================================

input {
    file {
        path => [ "/usr/share/logstash/tp-data/regularite-mensuelle-tgv-short.csv" ]
        start_position => 'beginning'
        # ✅ CORRIGÉ : "/dev/null" au lieu de "nul" (chemin Linux)
        sincedb_path => "/dev/null"
    }
}

filter {
    csv {
        columns => ["date","axe","depart","arrivee","trains_programmes",
                    "trains_circules","trains_annules","trains_retards","regularite"]
        separator => ";"
    }

    # Modification du champ date de la forme yyyy-mm vers yyyy-mm-dd
    mutate {
        replace => { "date" => "%{date}-01" }
    }

    # Cast du champ date vers un timestamp reconnu par Elasticsearch
    # Par défaut le résultat est envoyé au champ @timestamp
    date {
        match => [ "date", "YYYY-MM-dd" ]
        timezone => "UTC"
        # Si la conversion a réussi, on supprime le champ date
        remove_field => ["date"]
    }

    # Cast des champs numériques pour les agrégations Elasticsearch
    mutate {
        convert => { "trains_annules"    => "integer" }
        convert => { "trains_retards"    => "integer" }
        convert => { "trains_programmes" => "integer" }
        convert => { "regularite"        => "float"   }
        convert => { "trains_circules"   => "float"   }
    }
}

output {
    stdout {
    }
}
