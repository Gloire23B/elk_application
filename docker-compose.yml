version: '3.8'

# ============================================================
# Exchange Rate Proxy — Infrastructure complète
# Kafka + Elasticsearch + Kibana + Application Spring Boot
# ============================================================

services:

  # ---- Apache Kafka (KRaft, double listener) ----
  kafka:
    image: apache/kafka:3.7.1
    container_name: proxy-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      # Deux listeners :
      #   PLAINTEXT       → port 9092, annoncé en localhost:9092  (accès depuis la machine hôte)
      #   PLAINTEXT_INTERNAL → port 29092, annoncé en kafka:29092 (accès depuis les conteneurs Docker)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/9092"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - proxy-network

  # ---- Elasticsearch ----
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: proxy-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'yellow\\|green'"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 90s
    networks:
      - proxy-network

  # ---- Kibana ----
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: proxy-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_SECURITY_ENABLED=false
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - proxy-network

  # ---- Application Spring Boot ----
  exchange-rate-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exchange-rate-proxy-app
    ports:
      - "8090:8090"
    environment:
      # Kafka interne au réseau Docker (listener PLAINTEXT_INTERNAL)
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      # Elasticsearch interne au réseau Docker
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: on-failure
    networks:
      - proxy-network

volumes:
  kafka-data:
  es-data:

networks:
  proxy-network:
    driver: bridge
